<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Maxiweb - Duet</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #333; background: #111; }
    </style>
</head>
<body>
    <canvas id="juegoCanvas" width="400" height="600"></canvas>

 <script>
        let mejorTiempo = localStorage.getItem('maxiwebRecord') || 0;
        let estado = 'jugando';
        let girando = false;
        let velocidadGiro = 0.06;
        let direccion = 1;
        let tiempoInicio = Date.now(); // Inicializado aquí
        const canvas = document.getElementById('juegoCanvas');
        const ctx = canvas.getContext('2d');
        
        let angulo = 0;
        let velocidad = 2;
        const aceleracion = 0.0005;
        let obstaculos = [];

        function actualizarObstaculos() {
            velocidad += aceleracion;
            let ultimoObstaculo = obstaculos[obstaculos.length - 1];
            let puedeCrear = obstaculos.length === 0 || (ultimoObstaculo && ultimoObstaculo.y > 250);
            
            if (Math.random() < 0.02 && puedeCrear) {
                let posicionX = Math.floor(Math.random() * 200) + 50; 
                obstaculos.push({ x: posicionX, y: -50, w: 100, h: 20 });
            }

            for (let i = 0; i < obstaculos.length; i++) {
                obstaculos[i].y += velocidad;
            }

            if (obstaculos.length > 0 && obstaculos[0].y > canvas.height) {
                obstaculos.shift();
            }
        }

        function verificarColision(puntoX, puntoY, obs) {
            return puntoX > obs.x && puntoX < obs.x + obs.w && 
                   puntoY > obs.y && puntoY < obs.y + obs.h;
        }
        function formatearTiempo(segundosTotales) {
            let mins = Math.floor(segundosTotales / 60);
            let segs = Math.floor(segundosTotales % 60);
            // Esto hace que si son 5 segundos, se vea "05" en lugar de "5"
            let segsFormateado = segs < 10 ? "0" + segs : segs;
            
            if (mins > 0) {
                return mins + ":" + segsFormateado;
            }
            return segsFormateado + "s";
        }
       function dibujar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (estado === 'gameover') {
        ctx.fillStyle = 'white';
        ctx.font = '30px Arial';
        ctx.fillText('GAME OVER', 120, 300);
        ctx.fillText('Toca para reiniciar', 80, 350);

        // Aquí agregamos el récord:
        ctx.font = '20px Arial';
        ctx.fillText('Tu mejor tiempo: ' + formatearTiempo(mejorTiempo), 120, 400);
        
        // No ponemos return aquí para que el juego siga corriendo y detecte el clic de reinicio
    } else {
        // --- LÓGICA DE JUEGO (else) ---
        // Dibujar el tiempo
        let segundosTranscurridos = (Date.now() - tiempoInicio) / 1000;
        let tiempoTexto = formatearTiempo(segundosTranscurridos);
        ctx.fillStyle = 'white';
        ctx.font = '20px Arial';
        ctx.fillText('Tiempo: ' + tiempoTexto, 20, 30);
        
        // Dibujar el Récord a la derecha
        let recordTexto = formatearTiempo(mejorTiempo);
        ctx.textAlign = "right"; // Alineamos el texto a la derecha
        ctx.fillText('Récord: ' + recordTexto, 380, 30);
        ctx.textAlign = "left"; // Volvemos a dejar la alineación normal para lo demás
        
        actualizarObstaculos();
        ctx.fillStyle = 'white';
        for (let obs of obstaculos) {
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
        }

        ctx.save();
        ctx.translate(200, 300);
        ctx.rotate(angulo);
        
        let pxRojo = 100 * Math.cos(angulo);
        let pyRojo = 100 * Math.sin(angulo);
        let pxAzul = 100 * Math.cos(angulo + Math.PI);
        let pyAzul = 100 * Math.sin(angulo + Math.PI);

        let colision = false;
        for (let obs of obstaculos) {
            let obsAjustado = { x: obs.x - 200, y: obs.y - 300, w: obs.w, h: obs.h };
            
            if (verificarColision(pxRojo, pyRojo, obsAjustado) || verificarColision(pxAzul, pyAzul, obsAjustado)) {
                estado = 'gameover';
                colision = true;

                // Guardar récord
                let tiempoFinal = (Date.now() - tiempoInicio) / 1000;
                if (tiempoFinal > mejorTiempo) {
                    mejorTiempo = tiempoFinal;
                    localStorage.setItem('maxiwebRecord', mejorTiempo);
                }
            }  
        }               

        ctx.fillStyle = colision ? 'yellow' : 'red';
        ctx.beginPath(); ctx.arc(100, 0, 10, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = colision ? 'yellow' : 'blue';
        ctx.beginPath(); ctx.arc(-100, 0, 10, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        if (girando) {
            angulo += (velocidadGiro * direccion);
        }
    }
    requestAnimationFrame(dibujar);
}

        window.addEventListener('mousedown', (e) => {
            if (estado === 'gameover') {
                estado = 'jugando';
                obstaculos = [];
                velocidad = 2;
                angulo = 0;
                tiempoInicio = Date.now();
                girando = false;
            } else {
                girando = true;
                let rect = canvas.getBoundingClientRect();
                let clicX = e.clientX - rect.left;
                direccion = (clicX < canvas.width / 2) ? -1 : 1;
            }
        });

        window.addEventListener('mouseup', () => girando = false);
        window.addEventListener('mouseout', () => girando = false);

        dibujar();
    </script>
</body>
</html>
