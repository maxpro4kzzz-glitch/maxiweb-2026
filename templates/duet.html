<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Maxiweb - Duet</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #333; background: #111; }
    </style>
</head>
<body>
    <canvas id="juegoCanvas" width="400" height="600"></canvas>

    <script>
        let estado = 'jugando'; // Nuevo estado
        // 1. DECLARACIÓN
        let girando = false;
        let velocidadGiro = 0.15; // Velocidad de giro cuando mantienes presionado
        let direccion = 1; // 1 para horario, -1 para anti-horario
        let tiempoInicio = 0;
        const canvas = document.getElementById('juegoCanvas');
        const ctx = canvas.getContext('2d');
        
        let angulo = 0;
        let rotacion = 0.05;
        let velocidad = 2;
        const aceleracion = 0.0005; // Un poco más suave para que dure más
        let obstaculos = [];

        // 2. LÓGICA
       function actualizarObstaculos() {
            velocidad += aceleracion;

            // Nueva condición: Solo creamos uno nuevo si no hay obstáculos 
            // o si el último que creamos ya bajó al menos 200 píxeles
            let ultimoObstaculo = obstaculos[obstaculos.length - 1];
            let puedeCrear = obstaculos.length === 0 || (ultimoObstaculo && ultimoObstaculo.y > 200);
            
            // Generar obstáculo cada cierto tiempo
            if (Math.random() < 0.02) {
                // AQUÍ ESTÁ EL CAMBIO:
                // Generamos un número aleatorio entre 50 y 250
                // Así los bloques aparecen en distintas posiciones horizontales
                let posicionX = Math.floor(Math.random() * 200) + 50; 
                
                obstaculos.push({ x: posicionX, y: -50, w: 100, h: 20 });
            }

            for (let i = 0; i < obstaculos.length; i++) {
                obstaculos[i].y += velocidad;
            }

            // Limpieza: borrar obstáculos fuera de pantalla
            if (obstaculos.length > 0 && obstaculos[0].y > canvas.height) {
                obstaculos.shift();
            }
        }
function verificarColision(puntoX, puntoY, obs) {
            return puntoX > obs.x && 
                   puntoX < obs.x + obs.w && 
                   puntoY > obs.y && 
                   puntoY < obs.y + obs.h;
        }

        function dibujar() {
            if (estado === 'gameover') {
        ctx.fillStyle = 'white';
        ctx.font = '30px Arial';
        ctx.fillText('GAME OVER', 120, 300);
        ctx.fillText('Toca para reiniciar', 80, 350);
        return; 
    }
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar el tiempo
            let tiempoActual = ((Date.now() - tiempoInicio) / 1000).toFixed(1);
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText('Tiempo: ' + tiempoActual + 's', 20, 30);
            
            // Dibujar obstáculos
            actualizarObstaculos();
            ctx.fillStyle = 'white';
            for (let obs of obstaculos) {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            }

            // --- AQUÍ EMPIEZA LA LÓGICA DE LOS PUNTOS ---
            ctx.save();
            ctx.translate(200, 300);
            ctx.rotate(angulo);
            
            // Calcular posiciones reales para detectar el choque
            let pxRojo = 100 * Math.cos(angulo);
            let pyRojo = 100 * Math.sin(angulo);
            let pxAzul = 100 * Math.cos(angulo + Math.PI);
            let pyAzul = 100 * Math.sin(angulo + Math.PI);

            // Comprobar colisiones con todos los obstáculos
            let colision = false;
            for (let obs of obstaculos) {
                let obsAjustado = { x: obs.x - 200, y: obs.y - 300, w: obs.w, h: obs.h };
                if (verificarColision(pxRojo, pyRojo, obsAjustado) || 
    verificarColision(pxAzul, pyAzul, obsAjustado)) {
    estado = 'gameover'; // Cambiamos el estado al chocar
    colision = true; // <--- AGREGA ESTO AQUÍ
}
            }

            // Dibujar puntos (amarillo si hay colisión, normal si no)
            ctx.fillStyle = colision ? 'yellow' : 'red';
            ctx.beginPath(); ctx.arc(100, 0, 10, 0, Math.PI * 2); ctx.fill();
            
            ctx.fillStyle = colision ? 'yellow' : 'blue';
            ctx.beginPath(); ctx.arc(-100, 0, 10, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            // --- AQUÍ TERMINA ---
            
            angulo += rotacion;
            requestAnimationFrame(dibujar);
        }
// 3. EVENTOS
      // Cuando presionas el mouse o la pantalla:
window.addEventListener('mousedown', (e) => {
    if (estado === 'gameover') {
        // Lógica de reinicio que ya tenías
        estado = 'jugando';
        obstaculos = [];
        velocidad = 2;
        angulo = 0;
        tiempoInicio = Date.now();
    } else {
        girando = true; // Empezamos a girar
        // Si haces clic a la izquierda, giramos a un lado. A la derecha, al otro.
        direccion = (e.clientX < canvas.width / 2) ? -1 : 1;
    }
});

// Cuando sueltas el botón del mouse:
window.addEventListener('mouseup', () => {
    girando = false; // Nos detenemos
});
        // 4. ARRANQUE
        tiempoInicio = Date.now();
        dibujar();
    </script>
</body>
</html>
