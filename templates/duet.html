<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Maxiweb - Duet</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #333; background: #111; }
    </style>
</head>
<body>
    <canvas id="juegoCanvas" width="400" height="600"></canvas>

    <script>
        // 1. DECLARACIÓN
        const canvas = document.getElementById('juegoCanvas');
        const ctx = canvas.getContext('2d');
        
        let angulo = 0;
        let rotacion = 0.05;
        let velocidad = 2;
        const aceleracion = 0.0005; // Un poco más suave para que dure más
        let obstaculos = [];

        // 2. LÓGICA
        function actualizarObstaculos() {
            velocidad += aceleracion;
            
            // Generar obstáculo cada cierto tiempo
            if (Math.random() < 0.02) {
    // x: 50 a 350 es el ancho del canvas. 
    // Usamos un ancho menor (150) para dejar espacio a los costados
    obstaculos.push({ x: 125, y: -50, w: 150, h: 20 });
}

            for (let i = 0; i < obstaculos.length; i++) {
                obstaculos[i].y += velocidad;
            }

            // Limpieza: borrar obstáculos fuera de pantalla
            if (obstaculos.length > 0 && obstaculos[0].y > canvas.height) {
                obstaculos.shift();
            }
        }

        function dibujar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar obstáculos
            actualizarObstaculos();
            ctx.fillStyle = 'white';
            for (let obs of obstaculos) {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            }

            // Dibujar jugador
            ctx.save();
            ctx.translate(200, 300);
            ctx.rotate(angulo);
            
            ctx.fillStyle = 'red';
            ctx.beginPath(); ctx.arc(100, 0, 10, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'blue';
            ctx.beginPath(); ctx.arc(-100, 0, 10, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            
            angulo += rotacion;
            requestAnimationFrame(dibujar);
        }

        // 3. EVENTOS
        window.addEventListener('mousedown', () => rotacion *= -1);
        window.addEventListener('touchstart', () => rotacion *= -1);

        // 4. ARRANQUE
        dibujar();
    </script>
</body>
</html>
