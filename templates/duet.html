<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Maxiweb - Duet</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #333; background: #111; }
    </style>
</head>
<body>
    <canvas id="juegoCanvas" width="400" height="600"></canvas>

    <script>
        let estado = 'jugando'; // Nuevo estado
        // 1. DECLARACIÓN
        const canvas = document.getElementById('juegoCanvas');
        const ctx = canvas.getContext('2d');
        
        let angulo = 0;
        let rotacion = 0.05;
        let velocidad = 2;
        const aceleracion = 0.0005; // Un poco más suave para que dure más
        let obstaculos = [];

        // 2. LÓGICA
        function actualizarObstaculos() {
            velocidad += aceleracion;
            
            // Generar obstáculo cada cierto tiempo
            if (Math.random() < 0.02) {
    // x: 50 a 350 es el ancho del canvas. 
    // Usamos un ancho menor (150) para dejar espacio a los costados
    obstaculos.push({ x: 125, y: -50, w: 150, h: 20 });
}

            for (let i = 0; i < obstaculos.length; i++) {
                obstaculos[i].y += velocidad;
            }

            // Limpieza: borrar obstáculos fuera de pantalla
            if (obstaculos.length > 0 && obstaculos[0].y > canvas.height) {
                obstaculos.shift();
            }
        }
function verificarColision(puntoX, puntoY, obs) {
            return puntoX > obs.x && 
                   puntoX < obs.x + obs.w && 
                   puntoY > obs.y && 
                   puntoY < obs.y + obs.h;
        }

        function dibujar() {
            if (estado === 'gameover') {
        ctx.fillStyle = 'white';
        ctx.font = '30px Arial';
        ctx.fillText('GAME OVER', 120, 300);
        ctx.fillText('Toca para reiniciar', 80, 350);
        return; 
    }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar obstáculos
            actualizarObstaculos();
            ctx.fillStyle = 'white';
            for (let obs of obstaculos) {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            }

            // --- AQUÍ EMPIEZA LA LÓGICA DE LOS PUNTOS ---
            ctx.save();
            ctx.translate(200, 300);
            ctx.rotate(angulo);
            
            // Calcular posiciones reales para detectar el choque
            let pxRojo = 100 * Math.cos(angulo);
            let pyRojo = 100 * Math.sin(angulo);
            let pxAzul = 100 * Math.cos(angulo + Math.PI);
            let pyAzul = 100 * Math.sin(angulo + Math.PI);

            // Comprobar colisiones con todos los obstáculos
            let colision = false;
            for (let obs of obstaculos) {
                let obsAjustado = { x: obs.x - 200, y: obs.y - 300, w: obs.w, h: obs.h };
                if (verificarColision(pxRojo, pyRojo, obsAjustado) || 
    verificarColision(pxAzul, pyAzul, obsAjustado)) {
    estado = 'gameover'; // Cambiamos el estado al chocar
    colision = true; // <--- AGREGA ESTO AQUÍ
}
            }

            // Dibujar puntos (amarillo si hay colisión, normal si no)
            ctx.fillStyle = colision ? 'yellow' : 'red';
            ctx.beginPath(); ctx.arc(100, 0, 10, 0, Math.PI * 2); ctx.fill();
            
            ctx.fillStyle = colision ? 'yellow' : 'blue';
            ctx.beginPath(); ctx.arc(-100, 0, 10, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            // --- AQUÍ TERMINA ---
            
            angulo += rotacion;
            requestAnimationFrame(dibujar);
        }
// 3. EVENTOS
        window.addEventListener('mousedown', (e) => {
            if (estado === 'gameover') {
                // Lógica de reinicio
                estado = 'jugando';
                obstaculos = [];
                velocidad = 2;
                angulo = 0;
                dibujar(); 
            } else {
                // Lógica de juego: cambiar dirección
                rotacion *= -1;
            }
        });

        // Hacemos lo mismo para el tacto en móviles
        window.addEventListener('touchstart', (e) => {
            if (estado === 'gameover') {
                estado = 'jugando';
                obstaculos = [];
                velocidad = 2;
                angulo = 0;
                dibujar(); 
            } else {
                rotacion *= -1;
            }
        });

        // 4. ARRANQUE
        dibujar();
    </script>
</body>
</html>
