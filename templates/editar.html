<style>
    /* Estilos generales */
    body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
    
    .contenedor-edicion {
        width: 100%;
        max-width: 500px; /* No será más ancho de 500px */
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    textarea {
        width: 100%;
        height: 150px; /* Más grande para que sea cómodo */
        padding: 15px;
        font-size: 16px; /* Evita que el celular haga zoom automático */
        border: 2px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
    }

    button, .btn-cancelar {
        padding: 15px;
        font-size: 18px;
        cursor: pointer;
        border-radius: 8px;
        text-align: center;
        text-decoration: none;
        border: none;
    }

    button { background: #28a745; color: white; }
    .btn-cancelar { background: #dc3545; color: white; }
</style>

<div class="contenedor-edicion">
    <h2>Editar mensaje</h2>
    <form method="POST">
        <textarea name="contenido" required>{{ mensaje.content }}</textarea>
        <button type="submit">Guardar cambios</button>
        <a href="/" class="btn-cancelar">Cancelar</a>
    </form>
</div>
